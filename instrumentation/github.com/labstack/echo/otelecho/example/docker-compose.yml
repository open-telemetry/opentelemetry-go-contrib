version: "3.7"
services:
  echo-client:
    image: golang:alpine@sha256:3ad57304ad93bbec8548a0437ad9e06a455660655d9af011d58b993f6f615648
    networks:
      - example
    command:
      - "/bin/sh"
      - "-c"
      - "wget http://echo-server:8080/users/123 && cat 123"
    depends_on:
      - echo-server
  echo-server:
    build:
      dockerfile: $PWD/Dockerfile
      context: ../../../../../../
    ports:
      - "8080:80"
    command:
      - "/bin/sh"
      - "-c"
      - "/go/bin/server"
    networks:
      - example
networks:
  example:
