version: "3.7"
services:
  echo-client:
    image: golang:alpine@sha256:f23e8b227fb4493eabe03bede4d5a32d04092da71962f1fb79b5f7d1e6c2a17f
    networks:
      - example
    command:
      - "/bin/sh"
      - "-c"
      - "wget http://echo-server:8080/users/123 && cat 123"
    depends_on:
      - echo-server
  echo-server:
    build:
      dockerfile: $PWD/Dockerfile
      context: ../../../../../../
    ports:
      - "8080:80"
    command:
      - "/bin/sh"
      - "-c"
      - "/go/bin/server"
    networks:
      - example
networks:
  example:
